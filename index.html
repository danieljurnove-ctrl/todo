<body>
<main>
  <header class="page-header">
    <h1>To-Do <span id="taskCount" class="count" hidden></span></h1>
    <div class="header-controls">
      <span id="lastSynced" class="last-synced" hidden></span>
      <button id="refresh" class="link-btn" hidden title="Reload from your Google Sheet">Refresh</button>
      <button id="shortcuts" class="link-btn" title="Keyboard shortcuts (?)" aria-label="Keyboard shortcuts">?</button>
      <button id="signout" class="link-btn" hidden>Sign out</button>
    </div>
  </header>
  <nav class="tabs" id="tabs" hidden>
    <button class="tab active" type="button" data-view="tasks">Tasks</button>
    <button class="tab" type="button" data-view="books">Books</button>
  </nav>
  <div id="authBox" class="auth">
    <button id="signin" class="primary" disabled>Sign in with Google</button>
  </div>

  <div id="tasks-view">
    <div id="dayBanner" class="banner" hidden>
      <span class="banner-text" id="dayBannerText"></span>
      <button type="button" id="rollOverdueBtn" class="banner-action">Roll to today</button>
      <button type="button" id="dismissBannerBtn" class="banner-dismiss" aria-label="Dismiss">×</button>
    </div>
    <div id="compose" class="compose" hidden>
      <div class="type-chips" id="typeChips">
        <button type="button" data-type="task" class="active"><span class="glyph-mark">○</span> Task</button>
        <button type="button" data-type="event"><span class="glyph-mark">📅</span> Event</button>
        <button type="button" data-type="note"><span class="glyph-mark">📝</span> Note</button>
      </div>
      <form id="addForm">
        <input id="newTask" type="text" placeholder="Add a task..." autocomplete="off" required>
        <button type="submit" class="primary">Add</button>
      </form>
    </div>
    <div id="toolbar" hidden>
      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search tasks…" autocomplete="off">
        <button type="button" id="searchClear" class="search-clear" aria-label="Clear search" hidden>×</button>
      </div>
      <div class="view-controls">
        <select id="groupBy" title="Group by">
          <option value="date">Group: Date</option>
          <option value="category">Group: Category</option>
        </select>
        <select id="categoryFilter" title="Filter by category">
          <option value="">All categories</option>
        </select>
        <label class="toggle"><input type="checkbox" id="hideCompleted" checked> Show only open</label>
        <button type="button" id="reviewBtn" class="review-btn">Review</button>
      </div>
    </div>
    <div id="list"></div>
  </div>

  <div id="books-view" hidden>
    <div id="booksCompose" class="compose" hidden>
      <form id="addBookForm">
        <input id="newBook" type="text" placeholder="Add a book..." autocomplete="off" required>
        <button type="submit" class="primary">Add</button>
      </form>
    </div>
    <div id="booksToolbar" hidden>
      <div class="search-wrap">
        <input id="bookSearch" type="search" placeholder="Search books…" autocomplete="off">
        <button type="button" id="bookSearchClear" class="search-clear" aria-label="Clear search" hidden>×</button>
      </div>
      <div class="view-controls">
        <select id="bookSubView" title="View">
          <option value="list">View: List</option>
          <option value="stats">View: Stats</option>
        </select>
        <select id="statsScope" title="Stats scope" hidden>
          <option value="year">This year</option>
          <option value="all">All time</option>
        </select>
      </div>
    </div>
    <div id="booksList"></div>
    <div id="booksStats" hidden></div>
  </div>

  <p id="status">Loading Google libraries...</p>
</main>
<div id="toasts" aria-live="polite" aria-atomic="true"></div>

<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>

<script>
  // ─── Configuration ─────────────────────────────────────────
  const CLIENT_ID = '246998659570-laagb885kb85q2ffkkmmnkucgu53cbad.apps.googleusercontent.com';
  const SHEET_ID  = '1gH6KL-2FisBqP1VVH6Vg_M47QlRNWcdyq6I2qoM63jM';
  const SHEET_NAME = 'tasks';
  // ───────────────────────────────────────────────────────────

  const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
  const DISCOVERY = 'https://sheets.googleapis.com/$discovery/rest?version=v4';
  const TOKEN_KEY = 'todoApp.token';
  const LAST_SEEN_DATE_KEY = 'todoApp.lastSeenDate';

  // Display groups, computed dynamically from a task's ISO date relative to today.
  const GROUPS = [
    { value: 'overdue',    label: 'Overdue' },
    { value: 'today',      label: 'Today' },
    { value: 'tomorrow',   label: 'Tomorrow' },
    { value: 'this_week',  label: 'This Week' },
    { value: 'next_week',  label: 'Next Week' },
    { value: 'this_month', label: 'This Month' },
    { value: 'next_month', label: 'Next Month' },
    { value: 'this_year',  label: 'This Year' },
    { value: 'later',      label: 'Later' },
    { value: 'no_date',    label: 'No Date' },
  ];
  const SEED_CATEGORIES = ['Work', 'Personal', 'Errands', 'Health', 'Home'];
  const FIELD_COL = { text: 'B', status: 'C', category: 'D', due: 'E', notes: 'F', starred: 'G', type: 'H' };
  const ADD_NEW = '__add_new__';

  // ─── Books constants ───────────────────────────────────────
  const BOOKS_SHEET = 'books';
  const VIEW = { TASKS: 'tasks', BOOKS: 'books' };
  const BOOK_HEADERS = ['id','title','author','started_on','finished_on','rating','pages','genre','source','notes'];
  const BOOK_COL = {
    title: 'B', author: 'C', started: 'D', finished: 'E',
    rating: 'F', pages: 'G', genre: 'H', source: 'I', notes: 'J',
  };
  const SEED_SOURCES = ['Owned', 'Anthropic Library', 'Public Library'];

  const STATUSES = [
    { value: 'open',      label: 'Open' },
    { value: 'done',      label: 'Done' },
    { value: 'cancelled', label: 'Cancelled' },
  ];
  const TYPES = [
    { value: 'task',  label: 'Task',  glyph: '○' },
    { value: 'event', label: 'Event', glyph: '📅' },
    { value: 'note',  label: 'Note',  glyph: '📝' },
  ];
  function glyphForEntry(t) {
    if (t.type === 'event') return '📅';
    if (t.type === 'note')  return '📝';
    if (t.status === 'done')      return '✓';
    if (t.status === 'cancelled') return '~';
    return '○';
  }
  function normalizeStatus(raw) {
    const s = String(raw || '').toLowerCase().trim();
    if (s === 'true'  || s === 'done')      return 'done';
    if (s === 'cancelled' || s === 'canceled') return 'cancelled';
    return 'open'; // includes 'false', '', 'open', and anything unknown
  }
  function normalizeType(raw) {
    const s = String(raw || '').toLowerCase().trim();
    if (s === 'event' || s === 'note') return s;
    return 'task';
  }

  // ─── State ─────────────────────────────────────────────────
  let tokenClient = null;
  let gapiReady = false;
  let gisReady = false;
  let sheetGid = null;
  let todos = [];
  let expandedId = null;
  let editingId = null;
  let hideCompleted = true;
  let searchQuery = '';
  let groupBy = 'date';        // 'date' | 'category'
  let categoryFilter = '';     // '' = all
  let composeType = 'task';    // 'task' | 'event' | 'note'
  let pendingScrollToTask = null;  // id of task to scroll into view next render
  let pendingScrollToBook = null;  // id of book to scroll into view next render

  // ─── Books state ───────────────────────────────────────────
  let books = [];
  let booksSheetGid = null;
  let booksTabReady = false;        // tracks whether ensureBooksTab() has run
  let currentView = VIEW.TASKS;
  let bookSubView = 'list';         // 'list' | 'stats'
  let statsScope = 'year';          // 'year' | 'all'
  let bookSearchQuery = '';
  let expandedBookId = null;
  let editingBookId = null;

  // ─── Sync state ────────────────────────────────────────────
  let lastSyncedAt = null;          // ms timestamp of most recent full reload
  let lastSyncedTimer = null;       // interval id for the relative-time label

  const $ = (id) => document.getElementById(id);

  function setStatus(msg, isError = false) {
    const el = $('status');
    el.textContent = msg;
    el.classList.toggle('error', isError);
    // Spinner shows for in-flight messages ("Loading...", "Saving...", "Adding...").
    const busy = !isError && /\.\.\.$/.test(msg);
    el.classList.toggle('busy', busy);
  }

  function formatRelative(ms) {
    const secs = Math.max(0, Math.round(ms / 1000));
    if (secs < 10)  return 'just now';
    if (secs < 60)  return `${secs}s ago`;
    const mins = Math.round(secs / 60);
    if (mins < 60)  return `${mins} min ago`;
    const hrs = Math.round(mins / 60);
    if (hrs < 24)   return `${hrs} hr ago`;
    return `${Math.round(hrs / 24)} d ago`;
  }
  function updateLastSyncedLabel() {
    const el = $('lastSynced');
    if (!el || lastSyncedAt == null) return;
    el.textContent = `synced ${formatRelative(Date.now() - lastSyncedAt)}`;
  }
  function markSynced() {
    lastSyncedAt = Date.now();
    const el = $('lastSynced');
    if (el) { el.hidden = false; updateLastSyncedLabel(); }
    if (!lastSyncedTimer) {
      lastSyncedTimer = setInterval(updateLastSyncedLabel, 30_000);
    }
  }

  // Append `text` to `el`, wrapping case-insensitive matches of `query` in <mark>.
  // Safe: every chunk is a text node, no HTML injection.
  function highlightTextInto(el, text, query) {
    const q = (query || '').trim().toLowerCase();
    if (!q || !text) { el.textContent = text || ''; return; }
    const lower = text.toLowerCase();
    let i = 0;
    while (i < text.length) {
      const idx = lower.indexOf(q, i);
      if (idx === -1) { el.append(document.createTextNode(text.slice(i))); return; }
      if (idx > i) el.append(document.createTextNode(text.slice(i, idx)));
      const mark = document.createElement('mark');
      mark.textContent = text.slice(idx, idx + q.length);
      el.append(mark);
      i = idx + q.length;
    }
  }

  // Briefly highlight a row after a successful save, so the user sees confirmation.
  function flashSaved(selector) {
    const li = document.querySelector(selector);
    if (!li) return;
    li.classList.remove('saved-pulse'); // restart animation if already running
    // Force reflow so the class re-add triggers the animation.
    void li.offsetWidth;
    li.classList.add('saved-pulse');
    setTimeout(() => li.classList.remove('saved-pulse'), 700);
  }

  function extractError(e) {
    if (!e) return 'unknown';
    if (e.result && e.result.error) return e.result.error.message;
    return e.message || String(e);
  }

  // ─── Token persistence ─────────────────────────────────────
  // Access tokens are short-lived (~1 hour). We persist to localStorage so
  // page refreshes within that window don't require re-auth. After expiry,
  // user clicks sign-in once and we get a fresh token.
  function saveToken(tokenResp) {
    if (!tokenResp || !tokenResp.access_token) return;
    const expiresIn = Number(tokenResp.expires_in) || 3600;
    const data = {
      access_token: tokenResp.access_token,
      expires_at: Date.now() + Math.max(0, (expiresIn - 60)) * 1000, // 60s safety buffer
    };
    try { localStorage.setItem(TOKEN_KEY, JSON.stringify(data)); } catch (_) {}
  }

  function loadStoredToken() {
    try {
      const raw = localStorage.getItem(TOKEN_KEY);
      if (!raw) return null;
      const data = JSON.parse(raw);
      if (!data.access_token || Date.now() >= data.expires_at) {
        localStorage.removeItem(TOKEN_KEY);
        return null;
      }
      return data;
    } catch (_) { return null; }
  }

  function clearStoredToken() {
    try { localStorage.removeItem(TOKEN_KEY); } catch (_) {}
  }

  // Silent refresh: Google access tokens cap at 1 hour. We re-request a few
  // seconds before expiry with prompt:'' so it's UI-less as long as the user's
  // Google session is alive.
  let refreshTimer = null;
  function scheduleSilentRefresh() {
    if (refreshTimer) { clearTimeout(refreshTimer); refreshTimer = null; }
    const stored = loadStoredToken();
    if (!stored) return;
    const delay = Math.max(0, stored.expires_at - Date.now() - 60_000);
    refreshTimer = setTimeout(silentRefresh, delay);
  }
  function silentRefresh() {
    return new Promise((resolve) => {
      if (!tokenClient || !gapiReady) { resolve(false); return; }
      tokenClient.callback = (resp) => {
        if (resp && resp.access_token) {
          saveToken(resp);
          gapi.client.setToken({ access_token: resp.access_token });
          scheduleSilentRefresh();
          resolve(true);
        } else {
          resolve(false);
        }
      };
      try { tokenClient.requestAccessToken({ prompt: '' }); }
      catch (_) { resolve(false); }
    });
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    const stored = loadStoredToken();
    if (!stored) return;
    if (stored.expires_at - Date.now() < 5 * 60_000) silentRefresh();
  });

  // ─── Boot ──────────────────────────────────────────────────
  function gapiLoaded() {
    gapi.load('client', async () => {
      try {
        await gapi.client.init({ discoveryDocs: [DISCOVERY] });
        gapiReady = true;
        maybeReady();
      } catch (e) {
        setStatus('Failed to init Google API client: ' + extractError(e), true);
      }
    });
  }

  function gisLoaded() {
    try {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: () => {},
      });
      gisReady = true;
      maybeReady();
    } catch (e) {
      setStatus('Failed to init Google Identity Services: ' + extractError(e), true);
    }
  }

  async function maybeReady() {
    if (!(gapiReady && gisReady)) return;
    $('signin').disabled = false;
    // If we have a non-expired token from a previous sign-in, use it directly —
    // no GIS round-trip, no popup flicker.
    const stored = loadStoredToken();
    if (stored) {
      gapi.client.setToken({ access_token: stored.access_token });
      scheduleSilentRefresh();
      await onSignedIn();
      return;
    }
    setStatus('Sign in to load your tasks.');
  }

  // ─── Auth ──────────────────────────────────────────────────
  $('signin').addEventListener('click', () => {
    if (CLIENT_ID.startsWith('YOUR_') || SHEET_ID.startsWith('YOUR_')) {
      setStatus('Please set CLIENT_ID and SHEET_ID at the top of index.html.', true);
      return;
    }
    tokenClient.callback = async (resp) => {
      if (resp.error) {
        setStatus('Sign-in failed: ' + resp.error, true);
        return;
      }
      saveToken(resp);
      scheduleSilentRefresh();
      await onSignedIn();
    };
    // Empty prompt: Google shows consent only if not yet granted; otherwise
    // it's a near-silent token issuance (sometimes a brief account-picker flash).
    tokenClient.requestAccessToken({ prompt: '' });
  });

  $('shortcuts').addEventListener('click', () => openShortcutsModal());

  $('rollOverdueBtn').addEventListener('click', async () => {
    const btn = $('rollOverdueBtn');
    btn.disabled = true;
    await autoPromoteOverdue();
    $('dayBanner').hidden = true;
    btn.disabled = false;
  });
  $('dismissBannerBtn').addEventListener('click', () => {
    $('dayBanner').hidden = true;
  });

  $('refresh').addEventListener('click', async () => {
    const btn = $('refresh');
    btn.disabled = true;
    try {
      await Promise.all([loadTodos(), loadBooks()]);
      markSynced();
    } catch (e) {
      setStatus('Failed to refresh: ' + extractError(e), true);
    } finally {
      btn.disabled = false;
    }
  });

  $('signout').addEventListener('click', () => {
    if (refreshTimer) { clearTimeout(refreshTimer); refreshTimer = null; }
    const token = gapi.client.getToken();
    if (token && token.access_token) {
      google.accounts.oauth2.revoke(token.access_token, () => {});
    }
    gapi.client.setToken(null);
    clearStoredToken();
    todos = [];
    books = [];
    expandedId = null;
    editingId = null;
    expandedBookId = null;
    editingBookId = null;
    booksTabReady = false;
    booksSheetGid = null;
    render();
    $('authBox').hidden = false;
    $('signin').hidden = false;
    $('signout').hidden = true;
    $('refresh').hidden = true;
    $('lastSynced').hidden = true;
    $('dayBanner').hidden = true;
    if (lastSyncedTimer) { clearInterval(lastSyncedTimer); lastSyncedTimer = null; }
    lastSyncedAt = null;
    $('compose').hidden = true;
    $('toolbar').hidden = true;
    $('tabs').hidden = true;
    $('tasks-view').hidden = false;
    $('books-view').hidden = true;
    $('booksCompose').hidden = true;
    $('booksToolbar').hidden = true;
    setStatus('Signed out.');
  });

  async function onSignedIn(isRetry = false) {
    $('authBox').hidden = true;
    $('signin').hidden = true;
    $('signout').hidden = false;
    $('refresh').hidden = false;
    $('compose').hidden = false;
    $('toolbar').hidden = false;
    $('tabs').hidden = false;
    try {
      await resolveSheetGid();
      await ensureBooksTab();
      $('booksCompose').hidden = false;
      $('booksToolbar').hidden = false;
      await Promise.all([loadTodos(), loadBooks()]);
      markSynced();
      maybeShowDayChangeBanner();
      const initialView = location.hash === '#books' ? VIEW.BOOKS : VIEW.TASKS;
      switchView(initialView);
    } catch (e) {
      if (e && (e.status === 401 || e.status === 403)) {
        // Stale token. One silent refresh attempt before bouncing.
        if (!isRetry && await silentRefresh()) {
          return onSignedIn(true);
        }
        clearStoredToken();
        gapi.client.setToken(null);
        $('authBox').hidden = false;
        $('signin').hidden = false;
        $('signout').hidden = true;
        $('refresh').hidden = true;
        $('lastSynced').hidden = true;
        if (lastSyncedTimer) { clearInterval(lastSyncedTimer); lastSyncedTimer = null; }
        lastSyncedAt = null;
        $('compose').hidden = true;
        $('toolbar').hidden = true;
        $('tabs').hidden = true;
        setStatus('Session expired. Please sign in again.');
        return;
      }
      setStatus('Error: ' + extractError(e), true);
    }
  }

  // ─── Sheets API ────────────────────────────────────────────
  async function resolveSheetGid() {
    if (sheetGid !== null) return;
    const resp = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: SHEET_ID });
    const tasksSheet = resp.result.sheets.find(s => s.properties.title === SHEET_NAME);
    if (!tasksSheet) throw new Error(`Sheet tab "${SHEET_NAME}" not found.`);
    sheetGid = tasksSheet.properties.sheetId;
    // While we're here, also discover the books tab (saves an extra round-trip).
    const booksSheet = resp.result.sheets.find(s => s.properties.title === BOOKS_SHEET);
    if (booksSheet) {
      booksSheetGid = booksSheet.properties.sheetId;
      booksTabReady = true;
    }
  }

  async function loadTodos() {
    setStatus('Loading...');
    const resp = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: SHEET_ID,
      range: `${SHEET_NAME}!A2:H`,
    });
    const rows = resp.result.values || [];
    todos = rows.map((r, i) => ({
      id: r[0] || '',
      text: r[1] || '',
      status: normalizeStatus(r[2]),
      category: r[3] || '',
      due: migrateLegacyBucket(r[4] || ''),
      notes: r[5] || '',
      starred: String(r[6] || '').toUpperCase() === 'TRUE',
      type: normalizeType(r[7]),
      row: i + 2,
    }));
    render();
    setStatus(`${todos.length} task${todos.length === 1 ? '' : 's'}`);
  }

  async function addTodo(text, type = 'task') {
    const id = String(Date.now());
    setStatus('Adding...');
    await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId: SHEET_ID,
      range: `${SHEET_NAME}!A:H`,
      valueInputOption: 'RAW',
      insertDataOption: 'INSERT_ROWS',
      resource: { values: [[id, text, 'open', '', '', '', 'FALSE', type]] },
    });
    await loadTodos();
    expandedId = id;
    pendingScrollToTask = id;
    render();
  }

  async function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    if (todo.type !== 'task') return; // events and notes don't toggle
    const prevStatus = todo.status;
    const newStatus = todo.status === 'done' ? 'open' : 'done';
    todo.status = newStatus;
    render();
    try {
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: SHEET_ID,
        range: `${SHEET_NAME}!C${todo.row}`,
        valueInputOption: 'RAW',
        resource: { values: [[newStatus]] },
      });
      flashSaved(`li[data-task-id="${CSS.escape(id)}"]`);
    } catch (e) {
      todo.status = prevStatus;
      render();
      setStatus('Failed to update: ' + extractError(e), true);
    }
  }

  async function updateField(id, field, value) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    const col = FIELD_COL[field];
    if (!col) return;
    const prev = todo[field];
    if (prev === value) return;
    todo[field] = value;
    render();
    const cellValue = typeof value === 'boolean' ? (value ? 'TRUE' : 'FALSE') : value;
    try {
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: SHEET_ID,
        range: `${SHEET_NAME}!${col}${todo.row}`,
        valueInputOption: 'RAW',
        resource: { values: [[cellValue]] },
      });
      flashSaved(`li[data-task-id="${CSS.escape(id)}"]`);
    } catch (e) {
      todo[field] = prev;
      render();
      setStatus('Failed to update: ' + extractError(e), true);
    }
  }

  // Map of pending delete timers, keyed by todo id, so undo can cancel them.
  const pendingDeleteTimers = new Map();
  const UNDO_MS = 6000;

  function deleteTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    if (expandedId === id) expandedId = null;
    if (editingId === id) editingId = null;
    todo._pendingDelete = true;
    render();

    const undoToast = showUndoToast(`Deleted "${todo.text || 'task'}"`, () => {
      // Undo: clear flag, cancel timer, re-render
      delete todo._pendingDelete;
      const timer = pendingDeleteTimers.get(id);
      if (timer) {
        clearTimeout(timer);
        pendingDeleteTimers.delete(id);
      }
      render();
    });

    const timer = setTimeout(async () => {
      pendingDeleteTimers.delete(id);
      undoToast.dismiss();
      // Re-locate the todo (in case array shifted from other operations)
      const stillThere = todos.find(t => t.id === id);
      if (!stillThere || !stillThere._pendingDelete) return;
      try {
        await gapi.client.sheets.spreadsheets.batchUpdate({
          spreadsheetId: SHEET_ID,
          resource: {
            requests: [{
              deleteDimension: {
                range: {
                  sheetId: sheetGid,
                  dimension: 'ROWS',
                  startIndex: stillThere.row - 1,
                  endIndex: stillThere.row,
                },
              },
            }],
          },
        });
        await loadTodos();
      } catch (e) {
        delete stillThere._pendingDelete;
        render();
        setStatus('Failed to delete: ' + extractError(e), true);
      }
    }, UNDO_MS);
    pendingDeleteTimers.set(id, timer);
  }

  // Roll all open overdue tasks to today via a single batch update.
  // Returns the number of rows changed and a function to undo.
  async function autoPromoteOverdue() {
    const todayISO = isoDate(startOfToday());
    const overdue = todos.filter(t =>
      t.type === 'task' && t.status === 'open' && groupForDate(t.due) === 'overdue'
    );
    if (!overdue.length) return 0;
    const prev = overdue.map(t => ({ id: t.id, due: t.due, row: t.row }));
    const data = overdue.map(t => ({
      range: `${SHEET_NAME}!E${t.row}`,
      values: [[todayISO]],
    }));
    for (const t of overdue) t.due = todayISO;
    render();
    try {
      await gapi.client.sheets.spreadsheets.values.batchUpdate({
        spreadsheetId: SHEET_ID,
        resource: { valueInputOption: 'RAW', data },
      });
    } catch (e) {
      for (const p of prev) {
        const t = todos.find(x => x.id === p.id);
        if (t) t.due = p.due;
      }
      render();
      setStatus('Failed to roll overdue: ' + extractError(e), true);
      return 0;
    }
    showUndoToast(
      `Rolled ${overdue.length} task${overdue.length === 1 ? '' : 's'} to today`,
      async () => {
        // Restore by writing the previous date back into each row.
        const restoreData = prev.map(p => ({
          range: `${SHEET_NAME}!E${p.row}`,
          values: [[p.due]],
        }));
        for (const p of prev) {
          const t = todos.find(x => x.id === p.id);
          if (t) t.due = p.due;
        }
        render();
        try {
          await gapi.client.sheets.spreadsheets.values.batchUpdate({
            spreadsheetId: SHEET_ID,
            resource: { valueInputOption: 'RAW', data: restoreData },
          });
        } catch (e) {
          setStatus('Failed to undo: ' + extractError(e), true);
        }
      }
    );
    return overdue.length;
  }

  function maybeShowDayChangeBanner() {
    const today = isoDate(startOfToday());
    const last = localStorage.getItem(LAST_SEEN_DATE_KEY);
    localStorage.setItem(LAST_SEEN_DATE_KEY, today);
    // First sign-in ever: don't prompt — only future day-rollovers should.
    if (!last || last === today) return;
    const overdueCount = todos.filter(t =>
      t.type === 'task' && t.status === 'open' && groupForDate(t.due) === 'overdue'
    ).length;
    if (!overdueCount) return;
    $('dayBannerText').textContent =
      `${overdueCount} overdue task${overdueCount === 1 ? '' : 's'} carried over.`;
    $('dayBanner').hidden = false;
  }

  function showUndoToast(message, onUndo) {
    const root = $('toasts');
    const toast = document.createElement('div');
    toast.className = 'toast';

    const txt = document.createElement('span');
    txt.className = 'toast-text';
    txt.textContent = message;
    toast.append(txt);

    const undoBtn = document.createElement('button');
    undoBtn.type = 'button';
    undoBtn.textContent = 'Undo';
    undoBtn.setAttribute('aria-label', `Undo: ${message}`);
    undoBtn.addEventListener('click', () => {
      onUndo();
      dismiss();
    });
    toast.append(undoBtn);

    root.append(toast);
    // Move focus to Undo so keyboard users can reach it without tabbing the list.
    undoBtn.focus({ preventScroll: true });

    let dismissed = false;
    function dismiss() {
      if (dismissed) return;
      dismissed = true;
      toast.classList.add('fade-out');
      setTimeout(() => toast.remove(), 220);
    }
    // Auto-dismiss when the timer expires (slightly after).
    const autoTimer = setTimeout(dismiss, UNDO_MS + 200);
    return {
      dismiss: () => { clearTimeout(autoTimer); dismiss(); },
    };
  }

  // ─── Date helpers ──────────────────────────────────────────
  function pad2(n) { return String(n).padStart(2, '0'); }
  function isoDate(d) {
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  function parseISODate(s) {
    if (!s || !/^\d{4}-\d{2}-\d{2}$/.test(s)) return null;
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d); // local midnight
  }
  function addDays(d, n) {
    const r = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    r.setDate(r.getDate() + n);
    return r;
  }
  function startOfToday() {
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    return d;
  }
  // Convert v2 bucket strings to ISO dates in-memory. Editing a task writes
  // the new ISO value back to the sheet, so legacy buckets gradually disappear.
  function migrateLegacyBucket(s) {
    if (!s) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const today = startOfToday();
    const dow = today.getDay(); // 0 = Sunday
    const daysToSunday = ((7 - dow) % 7) || 7; // upcoming Sunday (1..7)
    switch (s) {
      case 'today':      return isoDate(today);
      case 'tomorrow':   return isoDate(addDays(today, 1));
      case 'this_week':  return isoDate(addDays(today, daysToSunday));
      case 'next_week':  return isoDate(addDays(today, daysToSunday + 7));
      case 'this_month': return isoDate(new Date(today.getFullYear(), today.getMonth() + 1, 0));
      case 'next_month': return isoDate(new Date(today.getFullYear(), today.getMonth() + 2, 0));
      case 'this_year':  return isoDate(new Date(today.getFullYear(), 11, 31));
      case 'whenever':   return '';
      default:           return '';
    }
  }
  function groupForDate(dueStr) {
    const d = parseISODate(dueStr);
    if (!d) return 'no_date';
    const today = startOfToday();
    const diffDays = Math.round((d - today) / 86400000);
    if (diffDays < 0)  return 'overdue';
    if (diffDays === 0) return 'today';
    if (diffDays === 1) return 'tomorrow';
    const dow = today.getDay();
    const daysToSunday = ((7 - dow) % 7) || 7;
    if (diffDays <= daysToSunday)     return 'this_week';
    if (diffDays <= daysToSunday + 7) return 'next_week';
    if (d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth()) return 'this_month';
    const nextMonth = new Date(today.getFullYear(), today.getMonth() + 1, 1);
    if (d.getFullYear() === nextMonth.getFullYear() && d.getMonth() === nextMonth.getMonth()) return 'next_month';
    if (d.getFullYear() === today.getFullYear()) return 'this_year';
    return 'later';
  }
  function formatDateLabel(dueStr) {
    const d = parseISODate(dueStr);
    if (!d) return '';
    const today = startOfToday();
    const diffDays = Math.round((d - today) / 86400000);
    if (diffDays === 0) return 'Today';
    if (diffDays === 1) return 'Tomorrow';
    if (diffDays === -1) return 'Yesterday';
    const sameYear = d.getFullYear() === today.getFullYear();
    const opts = sameYear
      ? { weekday: 'short', month: 'short', day: 'numeric' }
      : { month: 'short', day: 'numeric', year: 'numeric' };
    return d.toLocaleDateString(undefined, opts);
  }

  // ─── Helpers ───────────────────────────────────────────────
  function optionsFrom(items, key, seed = []) {
    const used = items.map(x => x[key]).filter(Boolean);
    return Array.from(new Set([...seed, ...used])).sort((a, b) => a.localeCompare(b));
  }

  function getCategoryOptions() {
    return optionsFrom(todos, 'category', SEED_CATEGORIES);
  }

  // Deterministic color per category name (stable across reloads & devices).
  function categoryStyle(name) {
    if (!name) return null;
    let h = 5381;
    for (let i = 0; i < name.length; i++) {
      h = ((h * 33) ^ name.charCodeAt(i)) >>> 0;
    }
    const hue = h % 360;
    return {
      bg:     `hsl(${hue} 75% 92%)`,
      color:  `hsl(${hue} 50% 28%)`,
      border: `hsl(${hue} 55% 78%)`,
    };
  }

  function visibleTodos() {
    // Hide rows that are mid-undo (deleted but inside the 6s undo window).
    let v = todos.filter(t => !t._pendingDelete);
    // "Show only open" hides done AND cancelled; events/notes are not
    // task-completable, so we keep them visible regardless.
    if (hideCompleted) {
      v = v.filter(t => t.type !== 'task' || t.status === 'open');
    }
    if (categoryFilter) {
      v = v.filter(t => (t.category || '') === categoryFilter);
    }
    const q = searchQuery.trim().toLowerCase();
    if (q) {
      v = v.filter(t =>
        (t.text || '').toLowerCase().includes(q) ||
        (t.category || '').toLowerCase().includes(q) ||
        (t.notes || '').toLowerCase().includes(q)
      );
    }
    return v;
  }

  function updateCategoryFilterOptions() {
    const sel = $('categoryFilter');
    if (!sel) return;
    const cats = getCategoryOptions();
    // If the currently-filtered category is no longer in the list, clear it.
    if (categoryFilter && !cats.includes(categoryFilter)) categoryFilter = '';
    sel.innerHTML = '';
    const all = document.createElement('option');
    all.value = '';
    all.textContent = 'All categories';
    sel.append(all);
    for (const c of cats) {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      sel.append(opt);
    }
    sel.value = categoryFilter;
  }

  // ─── Render ────────────────────────────────────────────────
  function render() {
    const root = $('list');
    root.innerHTML = '';

    const countEl = $('taskCount');
    if (currentView !== VIEW.TASKS || todos.length === 0) {
      countEl.hidden = true;
    } else {
      const open = todos.filter(t => t.type === 'task' && t.status === 'open').length;
      countEl.hidden = false;
      countEl.textContent = `· ${open} open / ${todos.length} total`;
    }

    // Refresh category filter dropdown options to reflect current data.
    updateCategoryFilterOptions();

    const visible = visibleTodos();
    // Sort: starred first; then by due date ascending; then no-date tasks last.
    const sorted = [...visible].sort((a, b) => {
      if (a.starred !== b.starred) return a.starred ? -1 : 1;
      if (!a.due && !b.due) return 0;
      if (!a.due) return 1;
      if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    });

    if (groupBy === 'category') {
      // Group by category. Empty/no-category bucket goes last.
      const cats = [...new Set(sorted.map(t => t.category || ''))].sort((a, b) => {
        if (!a && !b) return 0;
        if (!a) return 1;
        if (!b) return -1;
        return a.localeCompare(b);
      });
      for (const c of cats) {
        const items = sorted.filter(t => (t.category || '') === c);
        if (!items.length) continue;
        root.append(renderGroup({ label: c || 'No Category' }, items));
      }
    } else {
      // Group by date (default).
      for (const g of GROUPS) {
        const items = sorted.filter(t => groupForDate(t.due) === g.value);
        if (!items.length) continue;
        root.append(renderGroup(g, items));
      }
    }

    // Empty states
    if (todos.length === 0) {
      root.append(renderEmptyState('No tasks yet.', 'Add one above to get started.'));
    } else if (visible.length === 0) {
      if (searchQuery.trim()) {
        root.append(renderEmptyState(`No tasks match "${searchQuery.trim()}".`, 'Try a different search.'));
      } else if (categoryFilter) {
        root.append(renderEmptyState(`No tasks in "${categoryFilter}".`, 'Choose a different category or "All".'));
      } else if (hideCompleted) {
        root.append(renderEmptyState('All tasks are completed.', 'Uncheck "Hide completed" to see them.'));
      }
    }

    // post-render focus for inline edit
    if (editingId !== null) {
      const input = root.querySelector('.text-edit');
      if (input) {
        input.focus();
        input.select();
      }
    }

    // post-render scroll for tasks that just moved groups (e.g. date changed)
    if (pendingScrollToTask) {
      const li = root.querySelector(`li[data-task-id="${CSS.escape(pendingScrollToTask)}"]`);
      if (li) li.scrollIntoView({ block: 'center', behavior: 'smooth' });
      pendingScrollToTask = null;
    }
  }

  function renderEmptyState(main, hint) {
    const div = document.createElement('div');
    div.className = 'empty-state';
    const p = document.createElement('div');
    p.textContent = main;
    div.append(p);
    if (hint) {
      const h = document.createElement('div');
      h.className = 'hint';
      h.textContent = hint;
      div.append(h);
    }
    return div;
  }

  function renderGroup(horizon, items) {
    const section = document.createElement('section');
    section.className = 'group';
    const h = document.createElement('h2');
    h.textContent = horizon.label;
    section.append(h);
    const ul = document.createElement('ul');
    for (const t of items) ul.append(renderTask(t));
    section.append(ul);
    return section;
  }

  function renderTask(t) {
    const li = document.createElement('li');
    li.dataset.taskId = t.id;
    if (t.type === 'task' && t.status === 'done')      li.classList.add('done');
    if (t.type === 'task' && t.status === 'cancelled') li.classList.add('cancelled');
    if (t.type === 'event' && t.due) {
      const evDate = parseISODate(t.due);
      if (evDate && evDate < startOfToday()) li.classList.add('past-event');
    }
    if (expandedId === t.id) li.classList.add('expanded');

    const row = document.createElement('div');
    row.className = 'task-row';
    // Click row whitespace to toggle expand. Skip if click hit an interactive child.
    row.addEventListener('click', (e) => {
      if (e.target.closest('button, input, .text, .text-edit')) return;
      expandedId = expandedId === t.id ? null : t.id;
      render();
    });

    // Glyph button — replaces the old checkbox.
    const glyphBtn = document.createElement('button');
    glyphBtn.type = 'button';
    glyphBtn.className = 'glyph';
    glyphBtn.textContent = glyphForEntry(t);
    if (t.type === 'task') {
      glyphBtn.classList.add('task-' + t.status);
      const glyphLabel = t.status === 'done' ? 'Mark open' : 'Mark done';
      glyphBtn.title = glyphLabel;
      glyphBtn.setAttribute('aria-label', glyphLabel);
      glyphBtn.addEventListener('click', () => toggleTodo(t.id));
    } else {
      glyphBtn.classList.add(t.type); // 'event' or 'note'
      glyphBtn.disabled = true;
      const typeLabel = t.type === 'event' ? 'Event' : 'Note';
      glyphBtn.title = typeLabel;
      glyphBtn.setAttribute('aria-label', typeLabel);
    }
    row.append(glyphBtn);

    const star = document.createElement('button');
    star.type = 'button';
    star.className = 'star' + (t.starred ? ' on' : '');
    const starLabel = t.starred ? 'Unstar' : 'Star';
    star.title = starLabel;
    star.setAttribute('aria-label', starLabel);
    star.setAttribute('aria-pressed', t.starred ? 'true' : 'false');
    star.textContent = t.starred ? '★' : '☆';
    star.addEventListener('click', () => updateField(t.id, 'starred', !t.starred));
    row.append(star);

    if (editingId === t.id) {
      row.append(renderTextInput(t));
    } else {
      row.append(renderTextSpan(t));
    }

    if (t.category) {
      const badge = document.createElement('span');
      badge.className = 'badge category-badge';
      badge.title = 'Category';
      badge.textContent = t.category;
      const s = categoryStyle(t.category);
      if (s) {
        badge.style.backgroundColor = s.bg;
        badge.style.color = s.color;
        badge.style.borderColor = s.border;
      }
      row.append(badge);
    }

    if (t.due) {
      const dateBadge = document.createElement('span');
      dateBadge.className = 'badge date-badge';
      const isOverdue = groupForDate(t.due) === 'overdue'
        && (t.type !== 'task' || t.status === 'open');
      if (isOverdue) {
        dateBadge.classList.add('overdue');
        li.classList.add('overdue');
      }
      dateBadge.title = t.due;
      dateBadge.textContent = formatDateLabel(t.due);
      row.append(dateBadge);
    }

    const chev = document.createElement('button');
    chev.type = 'button';
    chev.className = 'icon-btn chevron';
    const chevLabel = expandedId === t.id ? 'Collapse details' : 'Expand details';
    chev.title = chevLabel;
    chev.setAttribute('aria-label', chevLabel);
    chev.setAttribute('aria-expanded', expandedId === t.id ? 'true' : 'false');
    chev.textContent = expandedId === t.id ? '▾' : '▸';
    chev.addEventListener('click', () => {
      expandedId = expandedId === t.id ? null : t.id;
      render();
    });
    row.append(chev);

    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'icon-btn delete';
    del.title = 'Delete';
    del.setAttribute('aria-label', `Delete ${t.type || 'task'}`);
    del.textContent = '×';
    del.addEventListener('click', () => deleteTodo(t.id));
    row.append(del);

    li.append(row);

    if (expandedId === t.id) {
      li.append(renderExpandPanel(t));
    }

    return li;
  }

  function renderTextSpan(t) {
    const span = document.createElement('span');
    span.className = 'text';
    highlightTextInto(span, t.text, searchQuery);
    span.title = 'Click to edit';
    span.addEventListener('click', () => {
      editingId = t.id;
      render();
    });
    return span;
  }

  function renderTextInput(t) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'text-edit';
    input.value = t.text;
    let canceled = false;
    let saved = false;

    const finish = async () => {
      if (saved) return;
      saved = true;
      const v = input.value.trim();
      editingId = null;
      if (canceled || !v || v === t.text) {
        render();
      } else {
        await updateField(t.id, 'text', v);
      }
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        input.blur();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        canceled = true;
        input.blur();
      }
    });
    return input;
  }

  function renderExpandPanel(t) {
    const panel = document.createElement('div');
    panel.className = 'expand-panel';

    // Notes (full width)
    const notesField = document.createElement('label');
    notesField.className = 'field full';
    notesField.append(document.createTextNode('Notes'));
    const notes = document.createElement('textarea');
    notes.value = t.notes;
    notes.placeholder = 'Add a note...';
    notes.addEventListener('blur', () => {
      if (notes.value !== t.notes) {
        updateField(t.id, 'notes', notes.value);
      }
    });
    notesField.append(notes);
    panel.append(notesField);

    // Type
    const typeField = document.createElement('label');
    typeField.className = 'field';
    typeField.append(document.createTextNode('Type'));
    const typeSel = document.createElement('select');
    for (const ty of TYPES) {
      const opt = document.createElement('option');
      opt.value = ty.value;
      opt.textContent = `${ty.glyph}  ${ty.label}`;
      if (t.type === ty.value) opt.selected = true;
      typeSel.append(opt);
    }
    typeSel.addEventListener('change', () => updateField(t.id, 'type', typeSel.value));
    typeField.append(typeSel);
    panel.append(typeField);

    // Status (only for tasks)
    if (t.type === 'task') {
      const statusField = document.createElement('label');
      statusField.className = 'field';
      statusField.append(document.createTextNode('Status'));
      const statusSel = document.createElement('select');
      for (const s of STATUSES) {
        const opt = document.createElement('option');
        opt.value = s.value;
        opt.textContent = s.label;
        if (t.status === s.value) opt.selected = true;
        statusSel.append(opt);
      }
      statusSel.addEventListener('change', () => updateField(t.id, 'status', statusSel.value));
      statusField.append(statusSel);
      panel.append(statusField);
    }

    // Category
    const catField = document.createElement('label');
    catField.className = 'field';
    catField.append(document.createTextNode('Category'));
    catField.append(renderCategoryControl(t));
    panel.append(catField);

    // Due date (with quick-set chips)
    const dueField = document.createElement('label');
    dueField.className = 'field full';
    dueField.append(document.createTextNode('Due date'));

    const chips = document.createElement('div');
    chips.className = 'quick-chips';
    const today = startOfToday();
    const presets = [
      { label: 'Today',    days: 0 },
      { label: 'Tomorrow', days: 1 },
      { label: '+1 week',  days: 7 },
      { label: '+1 month', months: 1 },
    ];
    for (const p of presets) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = p.label;
      b.addEventListener('click', () => {
        const d = p.months
          ? new Date(today.getFullYear(), today.getMonth() + p.months, today.getDate())
          : addDays(today, p.days);
        pendingScrollToTask = t.id;
        updateField(t.id, 'due', isoDate(d));
      });
      chips.append(b);
    }
    if (t.due) {
      const clr = document.createElement('button');
      clr.type = 'button';
      clr.className = 'clear';
      clr.textContent = 'Clear';
      clr.addEventListener('click', () => {
        pendingScrollToTask = t.id;
        updateField(t.id, 'due', '');
      });
      chips.append(clr);
    }
    dueField.append(chips);

    const dueInput = document.createElement('input');
    dueInput.type = 'date';
    dueInput.value = parseISODate(t.due) ? t.due : '';
    dueInput.addEventListener('change', () => {
      pendingScrollToTask = t.id;   // task is about to jump groups — bring it back into view
      updateField(t.id, 'due', dueInput.value);
    });
    dueField.append(dueInput);
    panel.append(dueField);

    return panel;
  }

  function renderCategoryControl(t) {
    // The category control is a select; if there's a current category, we also
    // append a small "Rename" button next to it that bulk-renames everywhere.
    const wrap = document.createElement('div');
    wrap.className = 'cat-wrap';

    const sel = document.createElement('select');

    const none = document.createElement('option');
    none.value = '';
    none.textContent = '(none)';
    if (!t.category) none.selected = true;
    sel.append(none);

    const opts = getCategoryOptions();
    if (t.category && !opts.includes(t.category)) opts.push(t.category);
    for (const c of opts) {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      if (t.category === c) opt.selected = true;
      sel.append(opt);
    }

    const addNew = document.createElement('option');
    addNew.value = ADD_NEW;
    addNew.textContent = '+ Add new…';
    sel.append(addNew);

    sel.addEventListener('change', () => {
      if (sel.value === ADD_NEW) {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'New category';
        sel.replaceWith(input);
        input.focus();
        let saved = false;
        const finish = async (commit) => {
          if (saved) return;
          saved = true;
          const v = input.value.trim();
          if (commit && v) {
            await updateField(t.id, 'category', v);
          } else {
            render();
          }
        };
        input.addEventListener('blur', () => finish(true));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); finish(true); }
          else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
        });
      } else {
        updateField(t.id, 'category', sel.value);
      }
    });

    wrap.append(sel);

    if (t.category) {
      const rename = document.createElement('button');
      rename.type = 'button';
      rename.className = 'cat-rename';
      rename.textContent = 'Rename';
      rename.title = `Rename "${t.category}" across all tasks`;
      rename.addEventListener('click', () => {
        const oldName = t.category;
        const input = document.createElement('input');
        input.type = 'text';
        input.value = oldName;
        input.className = 'cat-rename-input';
        wrap.replaceChildren(input);
        input.focus();
        input.select();
        let saved = false;
        const finish = async (commit) => {
          if (saved) return;
          saved = true;
          const v = input.value.trim();
          if (commit && v && v !== oldName) {
            await renameCategoryEverywhere(oldName, v);
          } else {
            render();
          }
        };
        input.addEventListener('blur', () => finish(true));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); finish(true); }
          else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
        });
      });
      wrap.append(rename);
    }

    return wrap;
  }

  async function renameCategoryEverywhere(oldName, newName) {
    if (!oldName || !newName || oldName === newName) return;
    const affected = todos.filter(t => t.category === oldName);
    if (!affected.length) { render(); return; }
    // Optimistic update
    for (const t of affected) t.category = newName;
    if (categoryFilter === oldName) categoryFilter = newName;
    render();
    try {
      await gapi.client.sheets.spreadsheets.values.batchUpdate({
        spreadsheetId: SHEET_ID,
        resource: {
          valueInputOption: 'RAW',
          data: affected.map(t => ({
            range: `${SHEET_NAME}!D${t.row}`,
            values: [[newName]],
          })),
        },
      });
      setStatus(`Renamed "${oldName}" → "${newName}" on ${affected.length} task${affected.length === 1 ? '' : 's'}.`);
    } catch (e) {
      // Revert
      for (const t of affected) t.category = oldName;
      if (categoryFilter === newName) categoryFilter = oldName;
      render();
      setStatus('Failed to rename: ' + extractError(e), true);
    }
  }

  // ─── Books data layer ──────────────────────────────────────
  async function ensureBooksTab() {
    if (booksTabReady) return;
    // resolveSheetGid would already have set booksSheetGid if the tab existed,
    // so reaching here means we need to create it.
    const created = await gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId: SHEET_ID,
      resource: { requests: [{ addSheet: { properties: { title: BOOKS_SHEET } } }] },
    });
    booksSheetGid = created.result.replies[0].addSheet.properties.sheetId;
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId: SHEET_ID,
      range: `${BOOKS_SHEET}!A1:J1`,
      valueInputOption: 'RAW',
      resource: { values: [BOOK_HEADERS] },
    });
    booksTabReady = true;
  }

  async function loadBooks() {
    setStatus('Loading books...');
    const resp = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: SHEET_ID,
      range: `${BOOKS_SHEET}!A2:J`,
    });
    const rows = resp.result.values || [];
    books = rows.map((r, i) => ({
      id: r[0] || '',
      title: r[1] || '',
      author: r[2] || '',
      started: r[3] || '',
      finished: r[4] || '',
      rating: r[5] ? (parseInt(r[5], 10) || null) : null,
      pages: r[6] ? (parseInt(r[6], 10) || null) : null,
      genre: r[7] || '',
      source: r[8] || '',
      notes: r[9] || '',
      row: i + 2,
    }));
    setStatus(`${books.length} book${books.length === 1 ? '' : 's'}`);
    renderBooks();
  }

  async function addBook(title) {
    const id = String(Date.now());
    setStatus('Adding...');
    await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId: SHEET_ID,
      range: `${BOOKS_SHEET}!A:J`,
      valueInputOption: 'RAW',
      insertDataOption: 'INSERT_ROWS',
      resource: { values: [[id, title, '', '', '', '', '', '', '', '']] },
    });
    expandedBookId = id;
    pendingScrollToBook = id;
    await loadBooks();   // loadBooks itself renders, picking up the state above
  }

  async function updateBookField(id, field, value) {
    const b = books.find(x => x.id === id);
    if (!b) return;
    const col = BOOK_COL[field];
    if (!col) return;
    const prev = b[field];
    if (prev === value) return;
    b[field] = value;
    renderBooks();
    const cellValue = (value === null || value === undefined) ? '' : String(value);
    try {
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: SHEET_ID,
        range: `${BOOKS_SHEET}!${col}${b.row}`,
        valueInputOption: 'RAW',
        resource: { values: [[cellValue]] },
      });
      flashSaved(`li[data-book-id="${CSS.escape(id)}"]`);
    } catch (e) {
      b[field] = prev;
      renderBooks();
      setStatus('Failed to update: ' + extractError(e), true);
    }
  }

  function deleteBook(id) {
    const b = books.find(x => x.id === id);
    if (!b) return;
    if (expandedBookId === id) expandedBookId = null;
    b._pendingDelete = true;
    renderBooks();
    const undoToast = showUndoToast(`Deleted "${b.title || 'book'}"`, () => {
      delete b._pendingDelete;
      const timer = pendingDeleteTimers.get(id);
      if (timer) { clearTimeout(timer); pendingDeleteTimers.delete(id); }
      renderBooks();
    });
    const timer = setTimeout(async () => {
      pendingDeleteTimers.delete(id);
      undoToast.dismiss();
      const stillThere = books.find(x => x.id === id);
      if (!stillThere || !stillThere._pendingDelete) return;
      try {
        await gapi.client.sheets.spreadsheets.batchUpdate({
          spreadsheetId: SHEET_ID,
          resource: {
            requests: [{
              deleteDimension: {
                range: {
                  sheetId: booksSheetGid,
                  dimension: 'ROWS',
                  startIndex: stillThere.row - 1,
                  endIndex: stillThere.row,
                },
              },
            }],
          },
        });
        await loadBooks();
      } catch (e) {
        delete stillThere._pendingDelete;
        renderBooks();
        setStatus('Failed to delete: ' + extractError(e), true);
      }
    }, UNDO_MS);
    pendingDeleteTimers.set(id, timer);
  }

  // ─── Book lookup (Open Library API) ────────────────────────
  async function lookupBook(title, author) {
    if (!title) return null;
    const params = new URLSearchParams();
    params.set('title', title);
    if (author) params.set('author', author);
    params.set('limit', '1');
    params.set('fields', 'key,title,author_name,number_of_pages_median,first_publish_year');
    const url = `https://openlibrary.org/search.json?${params.toString()}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`Open Library returned ${resp.status}`);
    const data = await resp.json();
    if (!data.docs || !data.docs.length) return null;
    const doc = data.docs[0];
    return {
      title: doc.title || '',
      authors: doc.author_name || [],
      pageCount: typeof doc.number_of_pages_median === 'number' && doc.number_of_pages_median > 0
        ? doc.number_of_pages_median : null,
      infoLink: doc.key ? `https://openlibrary.org${doc.key}` : null,
      workKey: doc.key || null,
    };
  }

  // ─── Books render ──────────────────────────────────────────
  function getGenreOptions()  { return optionsFrom(books, 'genre'); }
  function getSourceOptions() { return optionsFrom(books, 'source', SEED_SOURCES); }
  function visibleBooks() {
    let v = books.filter(b => !b._pendingDelete);
    const q = bookSearchQuery.trim().toLowerCase();
    if (q) {
      v = v.filter(b =>
        (b.title || '').toLowerCase().includes(q) ||
        (b.author || '').toLowerCase().includes(q) ||
        (b.genre || '').toLowerCase().includes(q) ||
        (b.notes || '').toLowerCase().includes(q)
      );
    }
    return v;
  }
  function bookYear(b) {
    if (!b.finished) return null;
    const d = parseISODate(b.finished);
    return d ? d.getFullYear() : null;
  }
  function bookStatus(b) {
    if (b.finished) return 'read';
    if (b.started)  return 'reading';
    return 'unread';
  }

  function renderBooks() {
    if (bookSubView === 'list') {
      $('booksList').hidden = false;
      $('booksStats').hidden = true;
      $('statsScope').hidden = true;
      renderBooksList();
    } else {
      $('booksList').hidden = true;
      $('booksStats').hidden = false;
      $('statsScope').hidden = false;
      renderStats();
    }
  }

  function renderBooksList() {
    const root = $('booksList');
    root.innerHTML = '';
    const visible = visibleBooks();

    const reading = visible.filter(b => bookStatus(b) === 'reading')
      .sort((a, b) => (b.started || '').localeCompare(a.started || ''));
    const readByYear = new Map();
    const unread = [];
    for (const b of visible) {
      const s = bookStatus(b);
      if (s === 'reading') continue;
      if (s === 'unread') { unread.push(b); continue; }
      const y = bookYear(b);
      if (!readByYear.has(y)) readByYear.set(y, []);
      readByYear.get(y).push(b);
    }
    for (const arr of readByYear.values()) {
      arr.sort((a, b) => (b.finished || '').localeCompare(a.finished || ''));
    }
    const years = Array.from(readByYear.keys()).sort((a, b) => b - a);

    if (reading.length) root.append(renderBookGroup('Currently Reading', reading));
    for (const y of years) root.append(renderBookGroup(`Read in ${y}`, readByYear.get(y)));
    if (unread.length) root.append(renderBookGroup('TBR / Unread', unread));

    if (books.length === 0) {
      root.append(renderEmptyState('No books yet.', 'Add one above to get started.'));
    } else if (visible.length === 0 && bookSearchQuery.trim()) {
      root.append(renderEmptyState(`No books match "${bookSearchQuery.trim()}".`, 'Try a different search.'));
    }

    // Restore focus to the book-title edit input if one is active.
    if (editingBookId !== null) {
      const inp = root.querySelector('.book-title-edit');
      if (inp) { inp.focus(); inp.select(); }
    }

    // Scroll a just-added/changed book into view.
    if (pendingScrollToBook) {
      const li = root.querySelector(`li[data-book-id="${CSS.escape(pendingScrollToBook)}"]`);
      if (li) li.scrollIntoView({ block: 'center', behavior: 'smooth' });
      pendingScrollToBook = null;
    }
  }

  function renderBookGroup(label, items) {
    const section = document.createElement('section');
    section.className = 'group';
    const h = document.createElement('h2');
    h.textContent = label;
    section.append(h);
    const ul = document.createElement('ul');
    for (const b of items) ul.append(renderBookRow(b));
    section.append(ul);
    return section;
  }

  function renderBookRow(b) {
    const li = document.createElement('li');
    li.dataset.bookId = b.id;
    if (expandedBookId === b.id) li.classList.add('expanded');

    const row = document.createElement('div');
    row.className = 'task-row book-row';
    row.addEventListener('click', (e) => {
      if (e.target.closest('button, input, .title, .stars-input')) return;
      expandedBookId = expandedBookId === b.id ? null : b.id;
      renderBooks();
    });

    const titleWrap = document.createElement('div');
    titleWrap.className = 'title';
    if (editingBookId === b.id) {
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'book-title-edit';
      input.value = b.title;
      let saved = false, canceled = false;
      const finish = async () => {
        if (saved) return;
        saved = true;
        const v = input.value.trim();
        editingBookId = null;
        if (canceled || !v || v === b.title) {
          renderBooks();
        } else {
          await updateBookField(b.id, 'title', v);
        }
      };
      input.addEventListener('blur', finish);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter')      { e.preventDefault(); input.blur(); }
        else if (e.key === 'Escape'){ e.preventDefault(); canceled = true; input.blur(); }
      });
      titleWrap.append(input);
    } else {
      const titleEl = document.createElement('span');
      titleEl.className = 'book-title';
      highlightTextInto(titleEl, b.title, bookSearchQuery);
      titleEl.title = 'Click to edit';
      titleEl.addEventListener('click', (e) => {
        e.stopPropagation();
        editingBookId = b.id;
        renderBooks();
      });
      titleWrap.append(titleEl);
    }
    if (b.author) {
      const au = document.createElement('span');
      au.className = 'book-author';
      highlightTextInto(au, b.author, bookSearchQuery);
      titleWrap.append(au);
    }
    row.append(titleWrap);

    if (b.rating) {
      const stars = document.createElement('span');
      stars.className = 'stars-badge';
      stars.textContent = '★'.repeat(b.rating) + '☆'.repeat(5 - b.rating);
      row.append(stars);
    }
    if (b.source) {
      const src = document.createElement('span');
      src.className = 'badge';
      src.textContent = b.source;
      const s = categoryStyle(b.source);
      if (s) {
        src.style.backgroundColor = s.bg;
        src.style.color = s.color;
        src.style.borderColor = s.border;
      }
      row.append(src);
    }
    const dateStr = b.finished || b.started;
    if (dateStr) {
      const db = document.createElement('span');
      db.className = 'badge date-badge';
      db.title = b.finished ? `Finished ${b.finished}` : `Started ${b.started}`;
      db.textContent = formatDateLabel(dateStr);
      row.append(db);
    }

    const chev = document.createElement('button');
    chev.type = 'button';
    chev.className = 'icon-btn chevron';
    const chevLabel = expandedBookId === b.id ? 'Collapse details' : 'Expand details';
    chev.title = chevLabel;
    chev.setAttribute('aria-label', chevLabel);
    chev.setAttribute('aria-expanded', expandedBookId === b.id ? 'true' : 'false');
    chev.textContent = expandedBookId === b.id ? '▾' : '▸';
    chev.addEventListener('click', () => {
      expandedBookId = expandedBookId === b.id ? null : b.id;
      renderBooks();
    });
    row.append(chev);

    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'icon-btn delete';
    del.title = 'Delete';
    del.setAttribute('aria-label', 'Delete book');
    del.textContent = '×';
    del.addEventListener('click', () => deleteBook(b.id));
    row.append(del);

    li.append(row);
    if (expandedBookId === b.id) li.append(renderBookExpandPanel(b));
    return li;
  }

  function renderBookExpandPanel(b) {
    const panel = document.createElement('div');
    panel.className = 'expand-panel';

    const author = mkField('Author', () => {
      const i = document.createElement('input');
      i.type = 'text';
      i.value = b.author;
      i.addEventListener('blur', () => { if (i.value !== b.author) updateBookField(b.id, 'author', i.value); });
      return i;
    });
    panel.append(author);

    panel.append(renderBookDateField(b, 'started', 'Started'));
    panel.append(renderBookDateField(b, 'finished', 'Finished'));

    const ratingField = document.createElement('label');
    ratingField.className = 'field';
    ratingField.append(document.createTextNode('Rating'));
    const starsRow = document.createElement('div');
    starsRow.className = 'stars-input';
    for (let i = 1; i <= 5; i++) {
      const sb = document.createElement('button');
      sb.type = 'button';
      sb.textContent = (b.rating && b.rating >= i) ? '★' : '☆';
      if (b.rating && b.rating >= i) sb.classList.add('on');
      sb.setAttribute('aria-label', `Rate ${i} star${i === 1 ? '' : 's'}`);
      sb.setAttribute('aria-pressed', (b.rating === i) ? 'true' : 'false');
      sb.addEventListener('click', () => {
        const newRating = (b.rating === i) ? null : i;
        updateBookField(b.id, 'rating', newRating);
      });
      starsRow.append(sb);
    }
    ratingField.append(starsRow);
    panel.append(ratingField);

    const pagesField = mkField('Pages', () => {
      const i = document.createElement('input');
      i.type = 'number';
      i.min = '1';
      i.value = b.pages == null ? '' : b.pages;
      i.addEventListener('blur', () => {
        const v = i.value ? (parseInt(i.value, 10) || null) : null;
        if (v !== b.pages) updateBookField(b.id, 'pages', v);
      });
      return i;
    });
    panel.append(pagesField);

    const genreField = document.createElement('label');
    genreField.className = 'field';
    genreField.append(document.createTextNode('Genre'));
    genreField.append(renderBookDropdown(b, 'genre', getGenreOptions()));
    panel.append(genreField);

    const sourceField = document.createElement('label');
    sourceField.className = 'field';
    sourceField.append(document.createTextNode('Source'));
    sourceField.append(renderBookDropdown(b, 'source', getSourceOptions()));
    panel.append(sourceField);

    const notesField = document.createElement('label');
    notesField.className = 'field full';
    notesField.append(document.createTextNode('Notes / review'));
    const notesArea = document.createElement('textarea');
    notesArea.value = b.notes;
    notesArea.placeholder = 'Thoughts, quotes, review...';
    notesArea.addEventListener('blur', () => {
      if (notesArea.value !== b.notes) updateBookField(b.id, 'notes', notesArea.value);
    });
    notesField.append(notesArea);
    panel.append(notesField);

    panel.append(renderLookupBlock(b));

    return panel;
  }

  function renderLookupBlock(b) {
    const wrap = document.createElement('div');
    wrap.className = 'lookup-block';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'lookup-btn';
    btn.textContent = '🔍 Look up missing fields';
    btn.title = 'Look up author & page count from Open Library';
    btn.addEventListener('click', async () => {
      const orig = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Looking up…';
      try {
        const r = await lookupBook(b.title, b.author);
        if (!r) {
          setStatus(`No Google Books match for "${b.title}".`);
        } else {
          const filled = [];
          if (!b.author && r.authors.length) {
            await updateBookField(b.id, 'author', r.authors.join(', '));
            filled.push('author');
          }
          if (!b.pages && r.pageCount) {
            await updateBookField(b.id, 'pages', r.pageCount);
            filled.push('pages');
          }
          if (filled.length) {
            setStatus(`Filled ${filled.join(' & ')} from "${r.title}".`);
          } else {
            setStatus(`Match: "${r.title}" — nothing to fill.`);
          }
        }
      } catch (e) {
        setStatus('Lookup failed: ' + extractError(e), true);
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
      }
    });
    wrap.append(btn);

    const gbLink = document.createElement('a');
    gbLink.className = 'lookup-link';
    gbLink.target = '_blank';
    gbLink.rel = 'noopener noreferrer';
    const gbQuery = encodeURIComponent(`${b.title} ${b.author || ''}`.trim());
    gbLink.href = `https://www.google.com/search?tbm=bks&q=${gbQuery}`;
    gbLink.textContent = '📖 Book on Google';
    wrap.append(gbLink);

    if (b.author) {
      const wikiLink = document.createElement('a');
      wikiLink.className = 'lookup-link';
      wikiLink.target = '_blank';
      wikiLink.rel = 'noopener noreferrer';
      wikiLink.href = `https://en.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(b.author)}`;
      wikiLink.textContent = '👤 Author on Wikipedia';
      wrap.append(wikiLink);
    }

    return wrap;
  }

  function renderBookDropdown(b, field, options) {
    const sel = document.createElement('select');
    const none = document.createElement('option');
    none.value = '';
    none.textContent = '(none)';
    if (!b[field]) none.selected = true;
    sel.append(none);
    const allOptions = [...options];
    if (b[field] && !allOptions.includes(b[field])) allOptions.push(b[field]);
    for (const opt of allOptions) {
      const o = document.createElement('option');
      o.value = opt;
      o.textContent = opt;
      if (b[field] === opt) o.selected = true;
      sel.append(o);
    }
    const addNew = document.createElement('option');
    addNew.value = ADD_NEW;
    addNew.textContent = '+ Add new…';
    sel.append(addNew);
    sel.addEventListener('change', () => {
      if (sel.value === ADD_NEW) {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `New ${field}`;
        sel.replaceWith(input);
        input.focus();
        let saved = false;
        const finish = async (commit) => {
          if (saved) return;
          saved = true;
          const v = input.value.trim();
          if (commit && v) await updateBookField(b.id, field, v);
          else renderBooks();
        };
        input.addEventListener('blur', () => finish(true));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); finish(true); }
          else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
        });
      } else {
        updateBookField(b.id, field, sel.value);
      }
    });
    return sel;
  }

  // ─── Stats render ──────────────────────────────────────────
  function renderStats() {
    const root = $('booksStats');
    root.innerHTML = '';

    const currentYear = new Date().getFullYear();
    let scoped = books.filter(b => !b._pendingDelete);
    if (statsScope === 'year') {
      scoped = scoped.filter(b => bookYear(b) === currentYear);
    }
    const readBooks = scoped.filter(b => b.finished);
    const reading = books.filter(b => !b._pendingDelete && bookStatus(b) === 'reading');

    const totalPages = readBooks.reduce((s, b) => s + (b.pages || 0), 0);
    const ratings = readBooks.map(b => b.rating).filter(r => r);
    const avgRating = ratings.length ? (ratings.reduce((a, c) => a + c, 0) / ratings.length) : null;

    const summary = document.createElement('div');
    summary.className = 'stats-summary';
    const big = document.createElement('div');
    big.className = 'big';
    big.textContent = `${readBooks.length} book${readBooks.length === 1 ? '' : 's'} ${statsScope === 'year' ? `read in ${currentYear}` : 'read total'}`;
    summary.append(big);
    const meta = document.createElement('div');
    meta.className = 'meta';
    const parts = [];
    if (totalPages) parts.push(`${totalPages.toLocaleString()} pages`);
    if (avgRating) parts.push(`avg rating ${avgRating.toFixed(1)} ★`);
    if (reading.length) parts.push(`${reading.length} currently reading`);
    meta.textContent = parts.join(' · ') || ' ';
    summary.append(meta);
    root.append(summary);

    if (readBooks.length === 0) {
      root.append(renderEmptyState('No data yet.', `Finish a book to see ${statsScope === 'year' ? "this year's" : 'your'} stats.`));
      return;
    }

    root.append(renderPagesOverTime(scoped));
    root.append(renderBarChart('By genre',  countBy(readBooks, b => b.genre  || '(no genre)')));
    root.append(renderBarChart('By rating', ratingBuckets(readBooks)));
    root.append(renderBarChart('By source', countBy(readBooks, b => b.source || '(no source)')));
  }

  function countBy(arr, keyFn) {
    const m = new Map();
    for (const x of arr) {
      const k = keyFn(x);
      m.set(k, (m.get(k) || 0) + 1);
    }
    return Array.from(m.entries()).sort((a, b) => b[1] - a[1]);
  }

  function ratingBuckets(arr) {
    const buckets = [[5,0],[4,0],[3,0],[2,0],[1,0]];
    for (const b of arr) {
      if (b.rating && b.rating >= 1 && b.rating <= 5) buckets[5 - b.rating][1]++;
    }
    return buckets.filter(([, c]) => c > 0).map(([r, c]) => [`${r}★`, c]);
  }

  function renderBarChart(title, entries) {
    const block = document.createElement('div');
    block.className = 'stats-block';
    const h = document.createElement('h3');
    h.textContent = title;
    block.append(h);
    if (entries.length === 0) {
      const empty = document.createElement('div');
      empty.style.color = 'var(--muted)';
      empty.style.fontSize = '12px';
      empty.style.padding = '4px';
      empty.textContent = 'No data';
      block.append(empty);
      return block;
    }
    const max = Math.max(...entries.map(e => e[1]));
    for (const [label, count] of entries) {
      const r = document.createElement('div');
      r.className = 'stats-bar';
      const l = document.createElement('span');
      l.className = 'label';
      l.textContent = label;
      l.title = label;
      r.append(l);
      const bar = document.createElement('div');
      bar.className = 'bar';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      fill.style.width = (count / max * 100) + '%';
      bar.append(fill);
      r.append(bar);
      const c = document.createElement('span');
      c.className = 'count';
      c.textContent = count;
      r.append(c);
      block.append(r);
    }
    return block;
  }

  // ─── Pages over time (SVG line chart) ──────────────────────
  function buildPagesPerMonth(books) {
    const months = new Map(); // 'YYYY-MM' -> pages (float)
    for (const b of books) {
      if (!b.pages || !b.started || !b.finished) continue;
      const s = parseISODate(b.started);
      const e = parseISODate(b.finished);
      if (!s || !e || e < s) continue;
      const days = Math.round((e - s) / 86400000) + 1;
      const ppd = b.pages / days;
      const d = new Date(s.getFullYear(), s.getMonth(), s.getDate());
      while (d <= e) {
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        months.set(key, (months.get(key) || 0) + ppd);
        d.setDate(d.getDate() + 1);
      }
    }
    return months;
  }

  function renderPagesOverTime(books) {
    const block = document.createElement('div');
    block.className = 'stats-block';
    const h = document.createElement('h3');
    h.textContent = 'Pages per month (evenly distributed)';
    block.append(h);
    const monthsMap = buildPagesPerMonth(books);
    if (monthsMap.size === 0) {
      const empty = document.createElement('div');
      empty.style.color = 'var(--muted)';
      empty.style.fontSize = '12px';
      empty.style.padding = '4px';
      empty.textContent = 'Need books with both start & finish dates AND page counts.';
      block.append(empty);
      return block;
    }
    const keys = Array.from(monthsMap.keys()).sort();
    const values = keys.map(k => Math.round(monthsMap.get(k)));

    const W = 600, H = 160, padL = 44, padR = 12, padT = 12, padB = 24;
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;
    const maxV = Math.max(...values, 1);

    const points = values.map((v, i) => {
      const x = padL + (keys.length === 1 ? innerW / 2 : (i / (keys.length - 1)) * innerW);
      const y = padT + innerH - (v / maxV) * innerH;
      return [x, y];
    });

    const SVG_NS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('class', 'line-chart');

    // Horizontal baseline & top reference lines
    const baseline = document.createElementNS(SVG_NS, 'line');
    baseline.setAttribute('x1', padL); baseline.setAttribute('x2', padL + innerW);
    baseline.setAttribute('y1', padT + innerH); baseline.setAttribute('y2', padT + innerH);
    baseline.setAttribute('class', 'grid-line');
    svg.append(baseline);
    const topline = document.createElementNS(SVG_NS, 'line');
    topline.setAttribute('x1', padL); topline.setAttribute('x2', padL + innerW);
    topline.setAttribute('y1', padT); topline.setAttribute('y2', padT);
    topline.setAttribute('class', 'grid-line');
    topline.setAttribute('stroke-dasharray', '2,3');
    svg.append(topline);

    // Y labels (max, 0)
    const maxLbl = document.createElementNS(SVG_NS, 'text');
    maxLbl.setAttribute('x', padL - 6); maxLbl.setAttribute('y', padT + 4);
    maxLbl.setAttribute('text-anchor', 'end');
    maxLbl.textContent = String(maxV);
    svg.append(maxLbl);
    const zeroLbl = document.createElementNS(SVG_NS, 'text');
    zeroLbl.setAttribute('x', padL - 6); zeroLbl.setAttribute('y', padT + innerH + 4);
    zeroLbl.setAttribute('text-anchor', 'end');
    zeroLbl.textContent = '0';
    svg.append(zeroLbl);

    // Polyline (or single point)
    if (points.length > 1) {
      const poly = document.createElementNS(SVG_NS, 'polyline');
      poly.setAttribute('points', points.map(p => p.join(',')).join(' '));
      poly.setAttribute('class', 'data-line');
      svg.append(poly);
    }
    for (const [x, y] of points) {
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', '3');
      c.setAttribute('class', 'data-dot');
      svg.append(c);
    }

    // X-axis labels (first and last)
    const formatMonth = (key) => {
      const [yr, mo] = key.split('-').map(Number);
      const d = new Date(yr, mo - 1, 1);
      return d.toLocaleDateString(undefined, { month: 'short', year: '2-digit' });
    };
    const firstLbl = document.createElementNS(SVG_NS, 'text');
    firstLbl.setAttribute('x', padL); firstLbl.setAttribute('y', H - 6);
    firstLbl.textContent = formatMonth(keys[0]);
    svg.append(firstLbl);
    if (keys.length > 1) {
      const lastLbl = document.createElementNS(SVG_NS, 'text');
      lastLbl.setAttribute('x', padL + innerW); lastLbl.setAttribute('y', H - 6);
      lastLbl.setAttribute('text-anchor', 'end');
      lastLbl.textContent = formatMonth(keys[keys.length - 1]);
      svg.append(lastLbl);
    }

    block.append(svg);
    return block;
  }

  function switchView(view) {
    if (view !== VIEW.TASKS && view !== VIEW.BOOKS) view = VIEW.TASKS;
    currentView = view;
    for (const tab of $('tabs').querySelectorAll('.tab')) {
      tab.classList.toggle('active', tab.dataset.view === view);
    }
    $('tasks-view').hidden = view !== VIEW.TASKS;
    $('books-view').hidden = view !== VIEW.BOOKS;
    $('taskCount').hidden = view !== VIEW.TASKS || todos.length === 0;
    if (location.hash !== `#${view}`) {
      history.replaceState(null, '', `#${view}`);
    }
    if (view === VIEW.BOOKS) {
      renderBooks();
    }
  }
