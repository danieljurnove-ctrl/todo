  // ─── Review modal ──────────────────────────────────────────
  $('reviewBtn').addEventListener('click', openReviewModal);

  function openReviewModal() {
    const today = isoDate(startOfToday());
    const overdue = todos.filter(t =>
      t.type === 'task' && t.status === 'open' && t.due && t.due < today
    ).sort((a, b) => a.due.localeCompare(b.due));
    const nodate = todos.filter(t =>
      t.type === 'task' && t.status === 'open' && !t.due
    );

    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) close();
    });

    const modal = document.createElement('div');
    modal.className = 'modal';

    const h = document.createElement('h2');
    h.textContent = 'Review';
    modal.append(h);

    const sub = document.createElement('p');
    sub.className = 'modal-sub';
    const total = overdue.length + nodate.length;
    sub.textContent = total === 0
      ? 'Nothing to review — everything is on track.'
      : `${overdue.length} overdue · ${nodate.length} no-date task${nodate.length === 1 ? '' : 's'}`;
    modal.append(sub);

    if (overdue.length) {
      modal.append(reviewSection('Overdue', overdue));
    }
    if (nodate.length) {
      modal.append(reviewSection('Open, no date', nodate));
    }
    if (!overdue.length && !nodate.length) {
      const ok = document.createElement('div');
      ok.className = 'empty-state';
      ok.textContent = 'No overdue or undated open tasks.';
      modal.append(ok);
    }

    const footer = document.createElement('div');
    footer.className = 'modal-footer';
    const closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.textContent = 'Done';
    closeBtn.addEventListener('click', close);
    footer.append(closeBtn);
    modal.append(footer);

    backdrop.append(modal);
    document.body.append(backdrop);

    function close() {
      backdrop.remove();
      document.removeEventListener('keydown', onKey);
    }
    function onKey(e) { if (e.key === 'Escape') close(); }
    document.addEventListener('keydown', onKey);
  }

  function reviewSection(title, items) {
    const section = document.createElement('div');
    section.className = 'review-section';
    const h3 = document.createElement('h3');
    h3.textContent = title;
    section.append(h3);
    const ul = document.createElement('ul');
    for (const t of items) ul.append(reviewItem(t));
    section.append(ul);
    return section;
  }

  function reviewItem(t) {
    const li = document.createElement('li');
    const top = document.createElement('div');
    top.className = 'review-row';
    const g = document.createElement('span');
    g.className = 'glyph';
    g.textContent = glyphForEntry(t);
    top.append(g);
    const txt = document.createElement('span');
    txt.className = 'text';
    txt.textContent = t.text;
    top.append(txt);
    if (t.due) {
      const d = document.createElement('span');
      d.className = 'muted-date';
      d.textContent = formatDateLabel(t.due);
      top.append(d);
    }
    li.append(top);

    const actions = document.createElement('div');
    actions.className = 'review-actions';

    const today = startOfToday();
    const mkBtn = (label, onClick, cls) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = label;
      if (cls) b.classList.add(cls);
      b.addEventListener('click', async () => {
        b.disabled = true;
        await onClick();
        // Re-render the modal to drop this item.
        const backdrop = document.querySelector('.modal-backdrop');
        if (backdrop) backdrop.remove();
        openReviewModal();
      });
      return b;
    };

    actions.append(mkBtn('Done',     () => updateField(t.id, 'status', 'done')));
    actions.append(mkBtn('Cancel',   () => updateField(t.id, 'status', 'cancelled'), 'cancel'));
    actions.append(mkBtn('→ Today',  () => updateField(t.id, 'due', isoDate(today))));
    actions.append(mkBtn('→ Tomorrow', () => updateField(t.id, 'due', isoDate(addDays(today, 1)))));

    const datePick = document.createElement('input');
    datePick.type = 'date';
    datePick.title = 'Reschedule to a specific date';
    datePick.addEventListener('change', async () => {
      if (!datePick.value) return;
      datePick.disabled = true;
      await updateField(t.id, 'due', datePick.value);
      const backdrop = document.querySelector('.modal-backdrop');
      if (backdrop) backdrop.remove();
      openReviewModal();
    });
    actions.append(datePick);

    li.append(actions);
    return li;
  }

  // ─── Keyboard shortcuts ────────────────────────────────────
  function focusedRowEl() {
    const a = document.activeElement;
    if (!a) return null;
    return a.closest('li[data-task-id], li[data-book-id]');
  }
  function focusAdjacent(direction) {
    const sel = currentView === VIEW.BOOKS ? '#booksList li[data-book-id]' : '#list li[data-task-id]';
    const items = Array.from(document.querySelectorAll(sel));
    if (!items.length) return;
    const current = focusedRowEl();
    const idx = current ? items.indexOf(current) : -1;
    const nextIdx = idx === -1
      ? (direction > 0 ? 0 : items.length - 1)
      : (idx + direction + items.length) % items.length;
    const target = items[nextIdx];
    const focusable = target.querySelector('.glyph, .star, .chevron, button');
    if (focusable) focusable.focus({ preventScroll: false });
  }
  function openShortcutsModal() {
    const existing = document.querySelector('.modal-backdrop');
    if (existing) existing.remove();
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    const modal = document.createElement('div');
    modal.className = 'modal';
    const h = document.createElement('h2');
    h.textContent = 'Keyboard shortcuts';
    modal.append(h);
    const sub = document.createElement('p');
    sub.className = 'modal-sub';
    sub.textContent = 'Press ? anytime to see this list.';
    modal.append(sub);
    const dl = document.createElement('dl');
    dl.className = 'shortcuts-list';
    const rows = [
      ['?',     'Show this list'],
      ['/',     'Focus search'],
      ['n',     'Focus add-new input'],
      ['j / k', 'Next / previous item'],
      ['s',     'Toggle star on focused task'],
      ['x',     'Toggle done on focused task'],
      ['e',     'Expand or collapse focused item'],
      ['Esc',   'Close panel · clear search · close this modal'],
      ['Enter', 'Save inline edit'],
    ];
    for (const [key, desc] of rows) {
      const dt = document.createElement('dt'); dt.textContent = key;
      const dd = document.createElement('dd'); dd.textContent = desc;
      dl.append(dt, dd);
    }
    modal.append(dl);
    const footer = document.createElement('div');
    footer.className = 'modal-footer';
    const closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.textContent = 'Done';
    closeBtn.addEventListener('click', close);
    footer.append(closeBtn);
    modal.append(footer);
    backdrop.append(modal);
    document.body.append(backdrop);
    closeBtn.focus();
    function close() {
      backdrop.remove();
      document.removeEventListener('keydown', onKey);
    }
    function onKey(e) { if (e.key === 'Escape') { e.preventDefault(); close(); } }
    document.addEventListener('keydown', onKey);
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) close(); });
  }

  document.addEventListener('keydown', (e) => {
    // Skip when typing in any input/textarea/select/contenteditable.
    const tgt = e.target;
    if (tgt && tgt.matches && tgt.matches('input, textarea, select, [contenteditable], [contenteditable=""], [contenteditable="true"]')) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === '?') {
      e.preventDefault();
      openShortcutsModal();
    } else if (e.key === '/') {
      const search = currentView === VIEW.BOOKS ? $('bookSearch') : $('search');
      if (search && !search.closest('[hidden]')) { e.preventDefault(); search.focus(); }
    } else if (e.key === 'n' || e.key === 'N') {
      const input = currentView === VIEW.BOOKS ? $('newBook') : $('newTask');
      if (input && !input.closest('[hidden]')) { e.preventDefault(); input.focus(); }
    } else if (e.key === 'j') {
      e.preventDefault();
      focusAdjacent(+1);
    } else if (e.key === 'k') {
      e.preventDefault();
      focusAdjacent(-1);
    } else if (e.key === 's') {
      const row = focusedRowEl();
      if (row && row.dataset.taskId) {
        const t = todos.find(x => x.id === row.dataset.taskId);
        if (t) { e.preventDefault(); updateField(t.id, 'starred', !t.starred); }
      }
    } else if (e.key === 'x') {
      const row = focusedRowEl();
      if (row && row.dataset.taskId) {
        e.preventDefault();
        toggleTodo(row.dataset.taskId);
      }
    } else if (e.key === 'e') {
      const row = focusedRowEl();
      if (!row) return;
      e.preventDefault();
      if (row.dataset.taskId) {
        expandedId = expandedId === row.dataset.taskId ? null : row.dataset.taskId;
        render();
      } else if (row.dataset.bookId) {
        expandedBookId = expandedBookId === row.dataset.bookId ? null : row.dataset.bookId;
        renderBooks();
      }
    } else if (e.key === 'Escape') {
      if (currentView === VIEW.BOOKS && expandedBookId !== null) {
        expandedBookId = null;
        renderBooks();
      } else if (expandedId !== null) {
        expandedId = null;
        render();
      }
    }
  });

  // ─── Service worker (PWA) ──────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
