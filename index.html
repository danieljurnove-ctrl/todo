<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>To-Do</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="To-Do">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  :root {
    --bg:       #faf6ec;
    --panel:    #fffcf3;
    --panel-2:  #f3eedf;
    --text:     #2a2622;
    --muted:    #857c6c;
    --border:   #d8cdb6;
    --accent:   #5d4221;
    --danger:   #993b2c;
    --done:     #a99e8a;
    --hover:    rgba(80,60,30,0.06);
    --badge-bg: rgba(80,60,30,0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Iowan Old Style', 'Hoefler Text', Cambria, Georgia, 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  .page-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 24px;
  }
  h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 600;
  }
  h1 .count {
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    margin-left: 8px;
  }
  .link-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 6px;
    font-size: 13px;
    text-decoration: underline;
    text-underline-offset: 2px;
    border-radius: 4px;
  }
  .link-btn:hover { color: var(--text); border-color: transparent; }
  .link-btn:disabled { opacity: 0.5; cursor: wait; }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .last-synced {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .auth { margin-bottom: 24px; }

  /* ─── Tab nav (Tasks / Books) ───────────────────────── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .tabs .tab {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 8px 16px;
    font: inherit;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: -1px;
    border-radius: 0;
  }
  .tabs .tab:hover { color: var(--text); }
  .tabs .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* ─── Pages-over-time line chart ──────────────────── */
  .line-chart {
    display: block;
    width: 100%;
    height: auto;
    color: var(--muted);
  }
  .line-chart .grid-line { stroke: var(--border); stroke-width: 1; }
  .line-chart .data-line { stroke: var(--accent); stroke-width: 2; fill: none; }
  .line-chart .data-dot  { fill: var(--accent); }
  .line-chart text { fill: currentColor; font-size: 11px; }

  /* ─── Inline book-title edit ───────────────────────── */
  .book-row .book-title-edit {
    flex: 1;
    font: inherit;
    font-size: 15px;
    padding: 2px 6px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    background: var(--panel);
    color: var(--text);
    min-width: 0;
  }

  /* ─── Books list ───────────────────────────────────── */
  .book-row .title {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 2px 4px;
    cursor: text;
    border-radius: 4px;
  }
  .book-row .title:hover { background: var(--hover); }
  .book-row .title .book-title {
    font-size: 15px;
    word-break: break-word;
  }
  .book-row .title .book-author {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }
  .book-row .stars-badge {
    font-size: 12px;
    color: #f59e0b;
    letter-spacing: 1px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* ─── Book lookup block (expand panel footer) ───────── */
  .lookup-block {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-top: 4px;
  }
  .lookup-block .lookup-btn,
  .lookup-block .lookup-link {
    font: inherit;
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 999px;
    cursor: pointer;
    text-decoration: none;
    text-transform: none;
    letter-spacing: 0;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .lookup-block .lookup-btn:hover,
  .lookup-block .lookup-link:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .lookup-block .lookup-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* ─── Star rating input (in expand panel) ──────────── */
  .stars-input {
    display: inline-flex;
    gap: 2px;
  }
  .stars-input button {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    font-size: 18px;
    line-height: 1;
    color: #cbb89a;
    border-radius: 3px;
  }
  .stars-input button:hover { background: var(--hover); }
  .stars-input button.on { color: #f59e0b; }

  /* ─── Stats view ───────────────────────────────────── */
  .stats-summary {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 18px;
    font-size: 14px;
  }
  .stats-summary .big { font-size: 22px; font-weight: 600; }
  .stats-summary .meta {
    color: var(--muted);
    font-size: 13px;
    margin-top: 2px;
  }
  .stats-block {
    margin-bottom: 20px;
  }
  .stats-block h3 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 8px;
    padding: 0 4px;
  }
  .stats-block .stats-bar {
    display: grid;
    grid-template-columns: 110px 1fr 36px;
    align-items: center;
    gap: 8px;
    padding: 4px 4px;
    font-size: 13px;
  }
  .stats-block .stats-bar .label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .stats-block .stats-bar .bar {
    height: 14px;
    background: var(--badge-bg);
    border-radius: 4px;
    overflow: hidden;
  }
  .stats-block .stats-bar .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
  }
  .stats-block .stats-bar .count {
    text-align: right;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  @media (max-width: 480px) {
    .stats-block .stats-bar {
      grid-template-columns: 88px 1fr 32px;
      font-size: 12px;
    }
  }
  button {
    font: inherit;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 6px;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover:not(:disabled) { filter: brightness(1.1); }

  .compose {
    margin-bottom: 16px;
  }
  .type-chips {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .type-chips button {
    font: inherit;
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    gap: 5px;
    align-items: center;
  }
  .type-chips button .glyph-mark {
    font-size: 14px;
    line-height: 1;
  }
  .type-chips button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  form#addForm {
    display: flex;
    gap: 8px;
    margin: 0;
  }
  input[type="text"], textarea, select {
    font: inherit;
    padding: 8px 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 6px;
  }
  input[type="text"]:focus,
  textarea:focus,
  select:focus {
    outline: none;
    border-color: var(--accent);
  }
  form#addForm input[type="text"] { flex: 1; }

  #toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .search-wrap {
    position: relative;
    flex: 1 1 200px;
    min-width: 0;
    display: flex;
  }
  .search-wrap input[type="search"] {
    flex: 1;
    min-width: 0;
    padding: 7px 32px 7px 10px;
    font-size: 13px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 6px;
    font-family: inherit;
  }
  .search-wrap input[type="search"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  /* Hide the browser-native clear button — we render our own for consistency. */
  .search-wrap input[type="search"]::-webkit-search-cancel-button,
  .search-wrap input[type="search"]::-webkit-search-decoration { -webkit-appearance: none; appearance: none; }
  .search-clear {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 20px;
    line-height: 1;
    padding: 0;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .search-clear:hover { background: var(--hover); color: var(--text); }
  @media (max-width: 480px) {
    .search-clear { width: 36px; height: 36px; font-size: 22px; }
    .search-wrap input[type="search"] { padding-right: 40px; }
  }
  #toolbar .view-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 12px;
  }
  #toolbar .view-controls select {
    font-size: 13px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
  }
  #toolbar .view-controls select:focus { outline: none; border-color: var(--accent); }
  #toolbar .toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  #toolbar input[type="checkbox"] { accent-color: var(--accent); }

  #list { display: block; }

  .group { margin-bottom: 22px; }
  .group:last-child { margin-bottom: 0; }
  .group h2 {
    font-size: 13px;
    font-weight: 600;
    font-style: italic;
    letter-spacing: 0.02em;
    color: var(--muted);
    margin: 0 0 8px;
    padding: 0 4px;
  }
  .group ul {
    list-style: none;
    padding: 0;
    margin: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    overflow: hidden;
  }
  .group li {
    border-bottom: 1px solid var(--border);
  }
  .group li:last-child { border-bottom: none; }

  .task-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
  }
  .task-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    flex-shrink: 0;
    cursor: pointer;
  }
  .task-row .glyph {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 18px;
    line-height: 1;
    padding: 0;
    border-radius: 4px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
  }
  .task-row .glyph.task-open    { color: var(--text); }
  .task-row .glyph.task-done    { color: var(--accent); }
  .task-row .glyph.task-cancelled { color: var(--muted); }
  .task-row .glyph.event        { color: var(--muted); cursor: default; }
  .task-row .glyph.note         { color: var(--muted); cursor: default; }
  .task-row .glyph[disabled]    { cursor: default; }
  .task-row .glyph:not([disabled]):hover { background: var(--hover); }
  li.cancelled .task-row .text { text-decoration: line-through; color: var(--done); }
  li.done .task-row .text { text-decoration: line-through; color: var(--done); }
  li.past-event { opacity: 0.6; }
  li.past-event .task-row .text { color: var(--muted); font-style: italic; }
  .task-row .star {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    font-size: 16px;
    color: var(--muted);
    flex-shrink: 0;
    border-radius: 4px;
  }
  .task-row .star:hover { color: var(--text); background: var(--hover); }
  .task-row .star.on { color: #f59e0b; }
  .task-row .star.on:hover { color: #d97706; }
  .task-row .text {
    flex: 1;
    word-break: break-word;
    cursor: text;
    padding: 2px 4px;
    border-radius: 4px;
    min-width: 0;
  }
  .task-row .text:hover { background: var(--hover); }
  li.done .task-row .text {
    text-decoration: line-through;
    color: var(--done);
  }
  .task-row .text-edit {
    flex: 1;
    padding: 2px 6px;
    font-size: inherit;
    border: 1px solid var(--accent);
    border-radius: 4px;
    background: var(--panel);
    color: var(--text);
    min-width: 0;
  }
  .task-row .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--badge-bg);
    color: var(--muted);
    flex-shrink: 0;
    white-space: nowrap;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    border: 1px solid transparent;
  }
  .task-row .category-badge { font-weight: 500; }
  .task-row .date-badge.overdue {
    background: rgba(220,38,38,0.12);
    color: var(--danger);
  }
  li.overdue:not(.done) .task-row .text {
    color: var(--danger);
  }
  /* Highlight the task the keyboard is on (used by j/k navigation and s/x/e). */
  li[data-task-id]:focus-within > .task-row,
  li[data-book-id]:focus-within > .task-row {
    background: var(--hover);
    border-radius: 6px;
  }
  mark { background: rgba(245, 158, 11, 0.35); color: inherit; border-radius: 2px; padding: 0 1px; }
  .task-row .icon-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    border-radius: 4px;
  }
  .task-row .icon-btn:hover { background: var(--hover); color: var(--text); }
  .task-row .delete:hover { color: var(--danger); }
  .task-row .chevron { font-size: 12px; }
  li.expanded .task-row .chevron { color: var(--accent); }

  .expand-panel {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 12px 16px 16px 38px;
    background: var(--panel-2);
    border-top: 1px solid var(--border);
  }
  .quick-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 6px;
  }
  .quick-chips button {
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 999px;
    cursor: pointer;
  }
  .quick-chips button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .quick-chips button.clear { color: var(--muted); }
  .quick-chips button.clear:hover { color: var(--danger); border-color: var(--danger); }
  .expand-panel .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .expand-panel .field.full { grid-column: 1 / -1; }
  .expand-panel .field textarea {
    font-size: 13px;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text);
    resize: vertical;
    min-height: 60px;
  }
  .expand-panel .field select,
  .expand-panel .field input[type="text"],
  .expand-panel .field input[type="date"] {
    font-size: 13px;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text);
    padding: 6px 8px;
  }
  .expand-panel .field .date-wrap {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .expand-panel .field .date-wrap input[type="date"] {
    flex: 1;
    min-width: 0;
  }
  .expand-panel .field .date-clear,
  .expand-panel .field .date-chip {
    font-size: 12px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    border-radius: 4px;
    text-transform: none;
    letter-spacing: 0;
  }
  .expand-panel .field .date-clear:hover,
  .expand-panel .field .date-chip:hover { color: var(--text); }
  .expand-panel .field .cat-wrap {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .expand-panel .field .cat-wrap select { flex: 1; min-width: 0; }
  .expand-panel .field .cat-rename {
    font: inherit;
    font-size: 12px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  .expand-panel .field .cat-rename:hover { color: var(--accent); border-color: var(--accent); }
  .expand-panel .field .cat-rename-input {
    flex: 1;
    font-size: 13px;
    padding: 6px 8px;
    border: 1px solid var(--accent);
    background: var(--panel);
    color: var(--text);
    border-radius: 4px;
  }
  @media (max-width: 480px) {
    .expand-panel { grid-template-columns: 1fr; padding-left: 14px; }
    .task-row {
      flex-wrap: wrap;
      gap: 8px;
      row-gap: 6px;
      padding: 12px;
    }
    /* Layout via order:
         line 1: checkbox/glyph · star · text (full remaining width)
         line 2: category · date · chevron · delete
       The ::after break forces a wrap when there are badges or a chevron.
       Chevron is included so it's always reachable as a tap target. */
    .task-row::after {
      content: '';
      flex-basis: 100%;
      height: 0;
      order: 5;
    }
    .task-row > input[type="checkbox"] { order: 1; }
    /* WCAG 2.5.5 minimum tap target is 24×24 (Level AA) / 44×44 (Level AAA).
       Bumping interactive controls to ~36px on small screens. */
    .task-row > .glyph                 { order: 1; width: 36px; height: 36px; font-size: 20px; }
    .task-row > .star                  { order: 2; padding: 8px 10px; font-size: 18px; }
    .task-row > .text,
    .task-row > .text-edit             { order: 3; flex: 1 1 0; min-width: 0; }
    .task-row > .title                 { order: 3; flex: 1 1 0; min-width: 0; }
    .task-row > .badge                 { order: 6; max-width: none; font-size: 12px; padding: 4px 10px; }
    .task-row > .stars-badge           { order: 6; }
    .task-row > .chevron               { order: 6; font-size: 16px; padding: 8px 12px; }
    .task-row > .delete                { order: 7; margin-left: auto; font-size: 18px; padding: 8px 12px; }
    /* Star rating inside the book expand panel: bigger buttons on mobile. */
    .stars-input button { padding: 8px 6px; font-size: 22px; min-width: 36px; }
  }

  #status {
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
    min-height: 1.5em;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  #status.error { color: var(--danger); }
  #status.busy::before {
    content: '';
    width: 12px;
    height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Brief flash applied to a list item after a successful save. */
  @keyframes saved-pulse {
    0%   { background-color: rgba(76, 134, 67, 0.18); }
    100% { background-color: transparent; }
  }
  li.saved-pulse > .task-row { animation: saved-pulse 600ms ease-out; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .hint { font-size: 12px; margin-top: 4px; }

  /* ─── Review modal ──────────────────────────────────── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(40, 32, 20, 0.4);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    z-index: 100;
    overflow-y: auto;
  }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 18px 14px;

    width: 100%;
    box-shadow: 0 10px 40px rgba(40,32,20,0.18);

    font-size: 18px;

    margin: 0 0 4px;

  .modal .modal-sub {

  .modal .review-section {

  .modal .review-section h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;

    color: var(--muted);

  .modal ul {
    list-style: none;
    padding: 0;
    margin: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .modal li {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .modal li:last-child { border-bottom: none; }
  .modal .review-row { display: flex; align-items: center; gap: 8px; }
  .modal .review-row .glyph { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
  .modal .review-row .text { flex: 1; word-break: break-word; }
  .modal .review-row .muted-date { font-size: 11px; color: var(--danger); white-space: nowrap; }
  .modal .review-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .modal .review-actions button {
    font: inherit;
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 999px;
    cursor: pointer;
  }
  .modal .review-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .modal .review-actions button.cancel:hover { color: var(--danger); border-color: var(--danger); }
  .modal .review-actions input[type="date"] {
    font: inherit;
    font-size: 12px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 999px;
  }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
  }
  .modal-footer button {
    font: inherit;
    padding: 7px 14px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
  }
  .review-btn {
    font: inherit;
    font-size: 13px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 999px;
    cursor: pointer;
  }
  .review-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Shortcuts modal */
  .shortcuts-list {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 16px;
    margin: 8px 0 0;
  }
  .shortcuts-list dt {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);

    padding: 2px 8px;
    align-self: start;
    white-space: nowrap;
  }
  .shortcuts-list dd { margin: 0; font-size: 14px; align-self: center; }

  /* ─── Undo toasts ───────────────────────────────────── */
  #toasts {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column-reverse;
    gap: 8px;
    z-index: 200;
    pointer-events: none;
  }
  .toast {
    pointer-events: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    box-shadow: 0 6px 20px rgba(40,32,20,0.18);
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 90vw;
    animation: toast-in 180ms ease-out;
  }
  .toast .toast-text {
    overflow: hidden;

    white-space: nowrap;
    max-width: 280px;

  .toast button {
    font: inherit;
    font-size: 12px;
    padding: 3px 10px;
    border: 1px solid var(--accent);

    color: var(--accent);
    border-radius: 999px;
    cursor: pointer;
  }
  .toast button:hover { background: var(--accent); color: #fff; }
  .toast.fade-out { animation: toast-out 220ms ease-in forwards; }
  @keyframes toast-in {
    from { transform: translateY(8px); opacity: 0; }
    to   { transform: translateY(0);   opacity: 1; }
  }
  @keyframes toast-out {
    from { opacity: 1; }
    to   { opacity: 0; transform: translateY(8px); }
  }

  /* Day-change banner (auto-promote overdue prompt). */
  .banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 16px;

  .banner-text { flex: 1; }

    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);

  .banner .banner-action:hover { filter: brightness(1.1); }
  .banner .banner-dismiss {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 20px;
    line-height: 1;
    padding: 0 6px;
  }
  .banner .banner-dismiss:hover { color: var(--text); }
